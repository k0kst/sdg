  function renderSection(label, body) {
    var bodyHtml;
    if (Array.isArray(body)) {
      bodyHtml = '<ul class="chip-list">' +
        body.map(function (item) { return '<li class="chip">' + escapeHtml(item) + '</li>'; }).join('') +
        '</ul>';
    } else {
      bodyHtml = '<div class="sdg-card-section-body">' + escapeHtml(body) + '</div>';
    }
    return '<div class="sdg-card-section">' +
      '<div class="sdg-card-section-label">' + escapeHtml(label) + '</div>' +
      bodyHtml +
    '</div>';
  }

  function renderSpotlightSection(label, body) {
    var bodyHtml;
    if (Array.isArray(body)) {
      bodyHtml = '<ul class="chip-list">' +
        body.map(function (item) { return '<li class="chip">' + escapeHtml(item) + '</li>'; }).join('') +
        '</ul>';
    } else {
      bodyHtml = '<div>' + escapeHtml(body) + '</div>';
    }
    return '<div class="spotlight-section">' +
      '<div class="spotlight-section-label">' + escapeHtml(label) + '</div>' +
      bodyHtml +
    '</div>';
  }

  function commitCategory(sdgId, cat) {
    appState.browseHistory.push({ id: sdgId, prevCat: appState.sdgSortings[sdgId] || null });
    appState.sdgSortings[sdgId] = cat;
    appState.browseIndex++;
    document.removeEventListener('keydown', browseKeyHandler);
    renderBrowseStack();
    renderHeader();
  }

  var browseKeyHandler = null;

  function attachStackHandlers() {
    if (appState.resortingId !== null) {
      var rid = appState.resortingId;

      function commitResort(cat) {
        appState.sdgSortings[rid] = cat;
        if (cat === 'not') {
          appState.topThreeOrder = appState.topThreeOrder.filter(function (id) { return id !== rid; });
          delete appState.purposeTags[rid];
          if (appState.pendingTop3Swap === rid) appState.pendingTop3Swap = null;
        }
        appState.resortingId = null;
        document.removeEventListener('keydown', resortKeyHandler);
        renderBrowseStack();
        renderHeader();
      }
      function cancelResort() {
        appState.resortingId = null;
        document.removeEventListener('keydown', resortKeyHandler);
        renderBrowseStack();
      }

      app.querySelectorAll('.zone').forEach(function (btn) {
        btn.addEventListener('click', function () {
          commitResort(btn.getAttribute('data-cat'));
        });
      });
      var cancelBtn = document.getElementById('resort-cancel');
      if (cancelBtn) cancelBtn.addEventListener('click', cancelResort);

      var resortKeyHandler = function (e) {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        if (e.key === '1') commitResort('not');
        else if (e.key === '2') commitResort('slightly');
        else if (e.key === '3') commitResort('very');
        else if (e.key === 'Escape') cancelResort();
      };
      document.addEventListener('keydown', resortKeyHandler);
      return;
    }

    if (appState.browseIndex >= 17) {
      var continueBtn = document.getElementById('stage1-continue');
      if (continueBtn) continueBtn.addEventListener('click', function () { goToStage('select'); });

      var restartBtn = document.getElementById('stage1-restart');
      if (restartBtn) {
        restartBtn.addEventListener('click', function () {
          if (!window.confirm('Clear your sorting and start the 17-card sort over?')) return;
          appState.sdgSortings = {};
          appState.browseHistory = [];
          appState.browseIndex = 0;
          appState.resortingId = null;
          appState.browseOrder = shuffleArray(SDGS.map(function (s) { return s.id; }));
          renderBrowseStack();
          renderHeader();
        });
      }

      attachReviewChipHandlers();
      return;
    }

    var currentId = appState.browseOrder[appState.browseIndex];

    app.querySelectorAll('.zone').forEach(function (btn) {
      btn.addEventListener('click', function () {
        commitCategory(currentId, btn.getAttribute('data-cat'));
      });
    });

    var undoBtn = document.getElementById('undo-btn');
    if (undoBtn) {
      undoBtn.addEventListener('click', function () {
        if (appState.browseHistory.length === 0) return;
        var last = appState.browseHistory.pop();
        appState.sdgSortings[last.id] = last.prevCat;
        appState.browseIndex--;
        document.removeEventListener('keydown', browseKeyHandler);
        renderBrowseStack();
        renderHeader();
      });
    }

    browseKeyHandler = function (e) {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.key === '1') commitCategory(currentId, 'not');
      else if (e.key === '2') commitCategory(currentId, 'slightly');
      else if (e.key === '3') commitCategory(currentId, 'very');
      else if ((e.key === 'ArrowLeft' || e.key === 'ArrowDown') && appState.browseHistory.length > 0) {
        var last = appState.browseHistory.pop();
        appState.sdgSortings[last.id] = last.prevCat;
        appState.browseIndex--;
        document.removeEventListener('keydown', browseKeyHandler);
        renderBrowseStack();
        renderHeader();
      }
    };
    document.addEventListener('keydown', browseKeyHandler);

    var frontCard = app.querySelector('.stack-card.front');
    if (frontCard) attachSwipeHandlers(frontCard, currentId);
  }

  function attachSwipeHandlers(card, sdgId) {
    if (!('ontouchstart' in window) && navigator.maxTouchPoints === 0) return;
    var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    var startX = 0, startY = 0, dragging = false;

    card.addEventListener('touchstart', function (e) {
      var t = e.touches[0];
      startX = t.clientX; startY = t.clientY; dragging = true;
    }, { passive: true });

    card.addEventListener('touchmove', function (e) {
      if (!dragging || reduced) return;
      var dx = e.touches[0].clientX - startX;
      var dy = e.touches[0].clientY - startY;
      card.style.transition = 'none';
      card.style.transform = 'translate(' + dx + 'px,' + dy + 'px) rotate(' + (dx / 20) + 'deg)';
    }, { passive: true });

    card.addEventListener('touchend', function (e) {
      if (!dragging) return;
      dragging = false;
      var dx = e.changedTouches[0].clientX - startX;
      var dy = e.changedTouches[0].clientY - startY;
      card.style.transition = 'transform 200ms ease-out';
      card.style.transform = '';
      if (Math.abs(dx) > 60 && Math.abs(dy) < 40) {
        commitCategory(sdgId, dx > 0 ? 'very' : 'not');
      } else if (dy < -60 && Math.abs(dx) < 40) {
        commitCategory(sdgId, 'slightly');
      }
    });
  }

  // -- Top-3 tray -------------------------------------------
  function renderTop3Tray() {
    var wrapper = document.getElementById('top3-tray-wrapper');
    if (!wrapper) return;
    var stage = appState.currentStage;
    if (stage !== 'select' && stage !== 'tag') { wrapper.innerHTML = ''; return; }

    var order = appState.topThreeOrder;
    var rankMode = appState.rankingMode;
    var rankProg = appState.rankingProgress;
    var pendingSwap = appState.pendingTop3Swap;

    var slotsHtml = '';
    for (var i = 0; i < 3; i++) {
      var sid = order[i];
      var ss = sid ? SDG_BY_ID[sid] : null;
      var filled = !!ss;
      var swapTarget = !!(pendingSwap && filled);
      var rankIdx = rankMode ? rankProg.indexOf(sid) : -1;
      var rankAssigned = rankIdx !== -1;

      var cls = 'tray-slot';
      if (filled) cls += ' is-filled';
      if (swapTarget) cls += ' is-swap-target';
      if (rankMode && filled && !rankAssigned) cls += ' rank-pending';
      if (rankAssigned) cls += ' rank-assigned';

      var rankLabel = rankAssigned ? String(rankIdx + 1) : String(i + 1);

      if (filled) {
        slotsHtml += '<button type="button" class="' + cls + '" data-slot-id="' + sid + '" ' +
          'aria-label="SDG ' + ss.id + ' ' + escapeHtml(ss.name) + '">' +
          '<span class="slot-rank" aria-hidden="true">' + rankLabel + '</span>' +
          '<span class="slot-icon" style="background:' + ss.color + ';" aria-hidden="true">' + ss.id + '</span>' +
          '<span class="slot-name">' + escapeHtml(ss.name) + '</span>' +
          (!rankMode ? '<span class="slot-remove" data-remove-id="' + sid + '" role="button" tabindex="0" aria-label="Remove ' + escapeHtml(ss.name) + '">×</span>' : '') +
        '</button>';
      } else {
        slotsHtml += '<div class="' + cls + '">' +
          '<span class="slot-rank" aria-hidden="true">' + String(i + 1) + '</span>' +
          '<span class="slot-empty-label">—</span>' +
        '</div>';
      }
    }

    var statusHtml = '';
    if (pendingSwap) {
      statusHtml = '<span class="tray-swap-msg">' + escapeHtml(UI.traySwapMsg || '3 is the cap — tap one to swap.') + '</span>';
    } else if (!rankMode && order.length === 3) {
      statusHtml = '<button type="button" class="tray-rerank" id="tray-rerank-btn"><span aria-hidden="true">&#x21BB;</span>' + escapeHtml(UI.trayRerank || 'Re-rank') + '</button>';
    } else {
      var msgs = [UI.trayStatus0 || '0 of 3', UI.trayStatus1 || '1 of 3', UI.trayStatus2 || '2 of 3', UI.trayStatus3 || '3 chosen'];
      statusHtml = escapeHtml(msgs[Math.min(order.length, 3)]);
    }

    var rankPanelHtml = '';
    if (rankMode) {
      rankPanelHtml = '<div class="rank-panel" role="status" aria-live="polite">' +
        '<p class="rank-prompt">' + escapeHtml(UI.rankPrompt || 'Which matters most? Tap #1 first, then #2, then #3.') + '</p>' +
        '<div class="rank-actions">' +
          (rankProg.length > 0 ? '<button type="button" class="rank-reset" id="rank-reset-btn">' + escapeHtml(UI.rankReset || 'Start over') + '</button>' : '') +
          '<button type="button" class="rank-skip" id="rank-skip-btn">' + escapeHtml(UI.rankSkip || 'Skip for now') + '</button>' +
        '</div>' +
      '</div>';
    }

    wrapper.innerHTML =
      '<aside class="top3-tray" role="region" aria-label="' + escapeHtml(UI.trayHeading || 'Your Top 3') + '">' +
        '<div class="top3-tray-inner">' +
          '<span class="tray-label" aria-hidden="true">' + escapeHtml(UI.trayHeading || 'Your Top 3') + '</span>' +
          '<div class="tray-slots">' + slotsHtml + '</div>' +
          '<div class="tray-status">' + statusHtml + '</div>' +
        '</div>' +
        rankPanelHtml +
      '</aside>';

    var trayEl = wrapper.querySelector('.top3-tray');

    trayEl.querySelectorAll('button.tray-slot[data-slot-id]').forEach(function (btn) {
      btn.addEventListener('click', function (e) {
        if (e.target.dataset.removeId) return;
        var slotId = parseInt(btn.getAttribute('data-slot-id'), 10);

        if (appState.pendingTop3Swap) {
          var swapIn = appState.pendingTop3Swap;
          removeFromTopThree(slotId);
          addToTopThree(swapIn);
          refreshTop3UI();
          return;
        }

        if (appState.rankingMode) {
          if (appState.rankingProgress.indexOf(slotId) !== -1) return;
          appState.rankingProgress.push(slotId);
          if (appState.rankingProgress.length === 3) {
            appState.topThreeOrder = appState.rankingProgress.slice();
            appState.rankingMode = false; appState.rankingProgress = [];
            showToast(UI.rankDone || 'Ranking saved');
            if (appState.currentStage === 'tag') {
              appState.currentTaggingIndex = 0;
              render();
            } else {
              renderTop3Tray();
            }
          } else {
            renderTop3Tray();
          }
        }
      });
    });

    trayEl.querySelectorAll('[data-remove-id]').forEach(function (el) {
      el.addEventListener('click', function (e) {
        e.stopPropagation();
        var removeId = parseInt(el.getAttribute('data-remove-id'), 10);
        removeFromTopThree(removeId);
        refreshTop3UI();
      });
    });

    var rerankBtn = document.getElementById('tray-rerank-btn');
    if (rerankBtn) rerankBtn.addEventListener('click', function () {
      appState.rankingMode = true; appState.rankingProgress = [];
      renderTop3Tray();
    });

    var skipBtn = document.getElementById('rank-skip-btn');
    if (skipBtn) skipBtn.addEventListener('click', function () {
      appState.rankingMode = false; appState.rankingProgress = [];
      showToast(UI.rankHint || 'You can re-rank anytime from the tray.');
      renderTop3Tray();
    });

    var resetBtn = document.getElementById('rank-reset-btn');
    if (resetBtn) resetBtn.addEventListener('click', function () {
      appState.rankingProgress = [];
      renderTop3Tray();
    });
  }

  // -- Stage 2 ----------------------------------------------
  function renderSelect() {
    app.className = 'stage-container stage-transition';
    var pool = computePool();

    // Prune topThree entries that are no longer in the pool (e.g., user re-sorted)
    appState.topThreeOrder = appState.topThreeOrder.filter(function (id) { return pool.indexOf(id) !== -1; });

    var html = '<section aria-labelledby="stage2-heading">' +
      '<button type="button" class="stage2-back" id="stage2-back">' +
        '<span class="stage2-back-arrow" aria-hidden="true">←</span>' +
        escapeHtml(UI.stage2BackLink) +
      '</button>' +
      '<div class="select-intro-row">' +
        '<div>' +
          '<h2 id="stage2-heading" class="stage-heading">' + escapeHtml(UI.stage2Heading) + '</h2>' +
          '<p class="stage-sub">' + escapeHtml(UI.stage2Intro) + '</p>' +
        '</div>' +
      '</div>';

    if (pool.length < 3) {
      html += '<div class="too-few-msg">' +
        '<p>' + escapeHtml(UI.stage2TooFewMsg) + '</p>' +
        '<button type="button" class="back-sort-btn" id="back-sort-btn">' + escapeHtml(UI.cardBackSortBtn) + '</button>' +
      '</div>';
      html += '</section>';
      app.innerHTML = html;
      document.getElementById('stage2-back').addEventListener('click', function () { goToStage('browse'); });
      document.getElementById('back-sort-btn').addEventListener('click', function () { goToStage('browse'); });
      return;
    }

    html += '<div class="sdg-grid" id="select-grid">';
    pool.forEach(function (id) {
      html += renderSelectCard(SDG_BY_ID[id]);
    });
    html += '</div>';

    html += '<p class="stage2-nudge">' + escapeHtml(UI.stage2NudgeLink) + '</p>';
    html += '</section>';

    app.innerHTML = html;
    renderTop3Tray();
    document.getElementById('stage2-back').addEventListener('click', function () { goToStage('browse'); });
    attachSelectHandlers();
  }

  function renderSelectCard(s) {
    var cat = appState.sdgSortings[s.id];
    var selected = appState.topThreeOrder.indexOf(s.id) !== -1;
    var full = appState.topThreeOrder.length >= 3 && !selected;
    var expanded = appState.expandedCards.has(s.id);

    var classes = ['sdg-card', 'selectable'];
    if (cat) classes.push('cat-' + cat);
    if (expanded) classes.push('is-open');
    if (selected) classes.push('selected');
    if (full) classes.push('disabled-slot');

    var html = '<article class="' + classes.join(' ') + '" data-id="' + s.id + '" ' +
               'style="--sdg-color:' + s.color + ';" aria-label="SDG ' + s.id + ', ' + escapeHtml(s.name) + '">';

    html += '<button type="button" class="sdg-card-header" data-action="toggle-expand" ' +
      'aria-expanded="' + (expanded ? 'true' : 'false') + '" aria-controls="expand-' + s.id + '">' +
      '<span class="sdg-card-icon" aria-hidden="true"><img src="icons/' + encodeURIComponent(s.iconFile) + '" alt=""></span>' +
      '<div class="sdg-card-title-group">' +
        '<div class="sdg-card-number">SDG ' + s.id + '</div>' +
        '<div class="sdg-card-name">' + escapeHtml(s.name) + '</div>' +
        '<p class="sdg-card-desc">' + escapeHtml(s.description) + '</p>' +
      '</div>' +
      '<span class="sdg-card-chev" aria-hidden="true">&#8964;</span>' +
    '</button>';

    html += '<div id="expand-' + s.id + '" class="sdg-card-expanded">' +
      renderSection(UI.sectionLabels.careerRoles, s.careerRoles) +
      renderSection(UI.sectionLabels.industries, s.industries) +
      renderSection(UI.sectionLabels.studyPathways, s.studyPathways) +
      renderSection(UI.sectionLabels.singaporeContext, s.singaporeContext) +
    '</div>';

    var btnLabel = selected ? UI.cardRemoveBtn : UI.cardAddBtn;
    html += '<button type="button" class="sdg-card-select-btn" data-action="toggle-top" ' +
            'aria-pressed="' + (selected ? 'true' : 'false') + '"' +

  function attachSelectHandlers() {
    var grid = document.getElementById('select-grid');
    if (!grid) return;
    grid.addEventListener('click', function (e) {
      var target = e.target;
      while (target && target !== grid && !target.dataset.action) target = target.parentNode;
      if (!target || target === grid) return;
      var card = target.closest('.sdg-card');
      if (!card) return;
      var id = parseInt(card.dataset.id, 10);
      var action = target.dataset.action;

      if (action === 'toggle-expand') {
        if (appState.expandedCards.has(id)) appState.expandedCards.delete(id);
        else appState.expandedCards.add(id);
        updateSelectCardInPlace(id);
      } else if (action === 'toggle-top') {
        if (appState.topThreeOrder.indexOf(id) !== -1) {
          removeFromTopThree(id);
        } else if (appState.topThreeOrder.length >= 3) {
          appState.pendingTop3Swap = id;
        } else {
          addToTopThree(id);
        }
        refreshTop3UI();
      }
    });
  }

  function updateSelectCardInPlace(id) {
    var card = document.querySelector('#select-grid .sdg-card[data-id="' + id + '"]');
    if (!card) return;
    var s = SDG_BY_ID[id];
    var wrapper = document.createElement('div');
    wrapper.innerHTML = renderSelectCard(s);
    var newCard = wrapper.firstChild;
    card.parentNode.replaceChild(newCard, card);
  }

  function renderSelectCards() {
    var grid = document.getElementById('select-grid');
    if (!grid) return;
    var pool = computePool();
    grid.innerHTML = pool.map(function (id) { return renderSelectCard(SDG_BY_ID[id]); }).join('');
  }

  // -- Stage 2b (Tag) ---------------------------------------

      '</article>' +

      '<div class="tag-counter-row">' +

      '<div class="tag-error" id="tag-error" role="alert" aria-live="polite">' + escapeHtml(UI.stage2bError) + '</div>';

      (group.sources || []).forEach(function (src) {
        var selected = hasPurposeTag(sdgId, src.id);

        html += '<button type="button" class="' + cls + '" ' +
          'data-purpose-id="' + escapeHtml(src.id) + '" ' +

          'aria-pressed="' + (selected ? 'true' : 'false') + '">' +
          '<span class="purpose-item-check" aria-hidden="true">\u2713</span>' +
          '<span class="purpose-item-body">' +
            '<span class="purpose-item-name">' + escapeHtml(src.name) + '</span>' +
          '</span>' +
        '</button>';
      });
      html += '</div></div>';
    });

    html += '<div class="tag-footer">' +
      '<button type="button" class="tag-back-link" id="tag-back-link">' + escapeHtml(UI.stage2bBackLink) + '</button>' +
      '<button type="button" class="tag-next-btn" id="tag-next-body-btn"' +
        (nextDisabled ? ' disabled aria-disabled="true"' : '') +
        '>' + escapeHtml(nextLabel) + '</button>' +
    '</div>';

    html += '</section>';

    app.innerHTML = html;
    renderTop3Tray();

    function syncTagChrome() {
      var count = getPurposeTagsFor(sdgId).length;
      var disabled = count < 1;
      var bodyBtn = document.getElementById('tag-next-body-btn');
      var headerBtn = document.getElementById('tag-next-header-btn');
      [bodyBtn, headerBtn].forEach(function (btn) {
        if (!btn) return;
        btn.disabled = disabled;
        btn.setAttribute('aria-disabled', String(disabled));
      });
      var counterEl = document.getElementById('tag-counter');
      if (counterEl) {
        var tmpl = UI.stage2bCounter || '{n} of 3 chosen';
        counterEl.textContent = tmpl.replace('{n}', String(count));
        counterEl.classList.toggle('is-full', count >= 3);
      }
    }

    var capMsgTimer = null;
    function flashCapMsg() {
      var capEl = document.getElementById('tag-cap-msg');
      if (!capEl) return;
      capEl.classList.add('show');
      if (capMsgTimer) clearTimeout(capMsgTimer);
      capMsgTimer = setTimeout(function () { capEl.classList.remove('show'); }, 2400);
    }

    var descEl = document.getElementById('purpose-active-desc');
    function showDesc(name, desc) {
      if (!descEl) return;

    var items = app.querySelectorAll('.purpose-item');

  // -- Reflection engine ------------------------------------
  var REFLECTION_TEMPLATES = [
    { id: 'all-planet',
      when: function (s) { return s.themes.planet === 3; },
      text: "All three of your picks centre on the living world — ecosystems, climate, the systems that hold life. That's rare focus. What does {top1Name} ask of you that the other two don't?" },
    { id: 'all-people',
      when: function (s) { return s.themes.people === 3; },
      text: "Your three are all about people — their dignity, learning, health, equity. You're drawn to the human scale. Which of the three feels closest to people you actually know?" },
    { id: 'all-prosperity',
      when: function (s) { return s.themes.prosperity === 3; },
      text: "You've chosen three goals about how economies and cities should work. You think in systems. Where does your picture of a fair economy start — with {top1Name}?" },
    { id: 'partnerships',
      when: function (s) { return s.topThreeIds.indexOf(17) !== -1; },
      text: "SDG 17 shows up for you — partnerships, the connective tissue. That's often a sign you see yourself in the joins between groups, not inside any one of them." },
    { id: 'people-planet',
      when: function (s) { return s.themes.people >= 1 && s.themes.planet >= 1 && s.themes.prosperity === 0; },
      text: "You're holding people and planet together — two priorities that sometimes pull against each other. Where do you think the real trade-off is, for you?" },
    { id: 'service-heavy',
      when: function (s) { return s.dominantPurposeCategory === 'Achievement & Impact' && s.totalPurposeTags >= 3; },
      text: "Across your three, the purposes you keep returning to are about making an impact. That's a strong signal. Is there a moment — recent or remembered — that started that pull?" },
    { id: 'competence-heavy',
      when: function (s) { return s.dominantPurposeCategory === 'Personal Development' && s.totalPurposeTags >= 3; },
      text: "Your picks tilt toward growth — becoming someone who can make a difference. Which of your three gives you the most room to do that, and why?" },
    { id: 'fallback',
      when: function () { return true; },
      text: "Your three picks aren't obvious neighbours — which is interesting. What's the thread you'd use to tie them together, if you had to?" }
  ];

  function computeReflectionSignals() {
    var ids = appState.topThreeOrder;
    var themes = { people: 0, planet: 0, prosperity: 0, peace: 0 };
    ids.forEach(function (id) {
      var s = SDG_BY_ID[id];
      if (s && s.theme && themes[s.theme] !== undefined) themes[s.theme]++;
    });

    var dominantTheme = null;
    var maxCount = 0;
    Object.keys(themes).forEach(function (t) {
      if (themes[t] > maxCount) { maxCount = themes[t]; dominantTheme = t; }
    });
    if (maxCount < 2) dominantTheme = null;

    var catCounts = {};
    var totalPurposeTags = 0;
    PURPOSES.forEach(function (group) {
      catCounts[group.category] = 0;
    });
    ids.forEach(function (id) {
      var tags = getPurposeTagsFor(id);
      totalPurposeTags += tags.length;
      tags.forEach(function (pid) {
        PURPOSES.forEach(function (group) {
          if ((group.sources || []).some(function (src) { return src.id === pid; })) {
            catCounts[group.category] = (catCounts[group.category] || 0) + 1;
          }
        });
      });
    });

    var dominantPurposeCategory = null;
    var maxCat = 0;
    Object.keys(catCounts).forEach(function (cat) {
      if (catCounts[cat] > maxCat) { maxCat = catCounts[cat]; dominantPurposeCategory = cat; }
    });
    if (maxCat < 2) dominantPurposeCategory = null;

    return {
      themes: themes,
      dominantTheme: dominantTheme,
      purposeCategoryCounts: catCounts,
      dominantPurposeCategory: dominantPurposeCategory,
      totalPurposeTags: totalPurposeTags,
      topThreeIds: ids
    };
  }

  function renderReflection() {
    var signals = computeReflectionSignals();
    var top1Name = appState.topThreeOrder[0] ? SDG_BY_ID[appState.topThreeOrder[0]].name : '';
    var template = null;
    for (var i = 0; i < REFLECTION_TEMPLATES.length; i++) {
      if (REFLECTION_TEMPLATES[i].when(signals)) { template = REFLECTION_TEMPLATES[i]; break; }
    }
    if (!template) return '';
    var text = template.text.replace('{top1Name}', top1Name);
    return '<div class="reflection-card">' +
      '<p class="reflection-eyebrow">' + escapeHtml(UI.reflectionEyebrow || 'A thought to sit with') + '</p>' +
      '<p class="reflection-body">' + escapeHtml(text) + '</p>' +
    '</div>';
  }

  function renderSpotlight(s, idx) {

  // -- Copy to clipboard ------------------------------------
  function buildCopyText() {
    var LIMIT = 500;
    var lines = [];
    lines.push('My SDG Purpose Compass');
    lines.push('');
    lines.push('Top 3:');
    appState.topThreeOrder.forEach(function (id, i) {
      var s = SDG_BY_ID[id];
      lines.push((i + 1) + '. SDG ' + s.id + ' ' + s.name);
    });

    var purposeLines = [];
    appState.topThreeOrder.forEach(function (id) {
      var pids = getPurposeTagsFor(id);
      if (!pids.length) return;
      var names = pids.map(function (pid) { return (PURPOSE_BY_ID[pid] || {}).name; }).filter(Boolean);
      if (names.length) purposeLines.push('- SDG ' + id + ': ' + names.join(', '));
    });
    if (purposeLines.length) {
      lines.push('');
      lines.push('Sources of purpose:');
      purposeLines.forEach(function (l) { lines.push(l); });
    }

    var text = lines.join('\n');
    if (text.length > LIMIT) text = text.slice(0, LIMIT - 1) + '…';
    return text;
  }

  function handlePdf() {
    var titleBlock = document.createElement('div');
    titleBlock.className = 'pdf-title-block';
    var dateStr = new Date().toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });
    titleBlock.innerHTML =
      '<div class="pdf-brand">SDG Explorer</div>' +
      '<div class="pdf-doc-title">Your Purpose Compass</div>' +
      '<div class="pdf-date">' + escapeHtml(dateStr) + '</div>';
    document.body.insertBefore(titleBlock, document.body.firstChild);

    var footer = document.createElement('div');
    footer.className = 'pdf-footer';
    footer.textContent = 'Generated ' + dateStr + ' · SDG Explorer';
    document.body.appendChild(footer);

    var cleanup = function () {
      if (titleBlock.parentNode) titleBlock.parentNode.removeChild(titleBlock);
      if (footer.parentNode) footer.parentNode.removeChild(footer);
      window.removeEventListener('afterprint', cleanup);
    };
    window.addEventListener('afterprint', cleanup);
    window.print();
  }

  function handleCopy() {
    var btn = document.getElementById('copy-btn');
    var confirmBox = document.getElementById('copy-confirm');
    if (!btn) return;
    btn.textContent = UI.stage3CopyingBtn;
    btn.disabled = true;

    var text = buildCopyText();
    var done = function (success) {
      if (success) {
        btn.textContent = UI.stage3CopiedBtn;
        btn.classList.add('copied');
        if (confirmBox) confirmBox.classList.add('show');
        setTimeout(function () {
          btn.textContent = UI.stage3CopyBtn;
          btn.classList.remove('copied');
          btn.disabled = false;
        }, 3000);
      } else {
        btn.textContent = UI.stage3CopyBtn;
        btn.disabled = false;
        if (confirmBox) {
          confirmBox.textContent = 'Copy failed. Please select and copy manually.';
          confirmBox.classList.add('show');
        }
      }
    };

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(
        function () { done(true); },
        function () { done(execCommandFallback(text)); }
      );
    } else {
      done(execCommandFallback(text));
    }
  }

  function execCommandFallback(text) {
    try {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.setAttribute('readonly', '');
      ta.style.position = 'fixed';
      ta.style.top = '0';
      ta.style.left = '0';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      ta.setSelectionRange(0, text.length);
      var ok = document.execCommand('copy');
      document.body.removeChild(ta);
      return ok;
    } catch (err) {
      return false;
    }
  }

  // -- Restart modal ----------------------------------------

  modal.addEventListener('click', function (e) {

  });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && modal.classList.contains('show')) closeRestartModal();
  });

  var lastFocusedBeforeModal = null;
  function openRestartModal() {
    lastFocusedBeforeModal = document.activeElement;
    modal.classList.add('show');
    setTimeout(function () {
      var btn = document.getElementById('modal-confirm');
      if (btn) btn.focus();
    }, 50);
  }
  function closeRestartModal() {
    modal.classList.remove('show');
    if (lastFocusedBeforeModal && lastFocusedBeforeModal.focus) lastFocusedBeforeModal.focus();
  }

  // -- Navigation -------------------------------------------
  function goToStage(stage) {
    if (stage === appState.currentStage) return;
    appState.currentStage = stage;
    appState.pendingTop3Swap = null;
    appState.pendingPurposeSwap = null;
    window.scrollTo({ top: 0, behavior: 'auto' });
    render();
  }

  function render() {
    renderHeader();
    renderTop3Tray();
    switch (appState.currentStage) {
      case 'landing': renderLanding(); break;
      case 'browse':  renderBrowse();  break;
      case 'select':  renderSelect();  break;
      case 'tag':     renderTag();     break;
      case 'summary': renderSummary(); break;
      default:        renderLanding();
    }
  }

  // -- Orientation nudge ------------------------------------
  var nudge = document.getElementById('orientation-nudge');
  document.getElementById('orientation-nudge-text').textContent = UI.orientationNudge;
  document.getElementById('orientation-nudge-dismiss').textContent = UI.orientationDismiss;
  document.getElementById('orientation-nudge-dismiss').addEventListener('click', function () {
    appState.orientationNudgeDismissed = true;
    nudge.classList.remove('show');
  });
  function updateOrientationNudge() {
    if (appState.orientationNudgeDismissed) {
      nudge.classList.remove('show');
      return;
    }
    var w = window.innerWidth;
    var isTablet = w >= 768 && w <= 1279;
    var isPortrait = window.innerHeight > window.innerWidth;
    if (isTablet && isPortrait) nudge.classList.add('show');
    else nudge.classList.remove('show');
  }
  var _resizeDebounce;
  window.addEventListener('resize', function () {
    clearTimeout(_resizeDebounce);
    _resizeDebounce = setTimeout(function () {
      appState._stackCardHeight = null;
      if (appState.currentStage === 'browse') render();
    }, 200);
  });
  window.addEventListener('resize', updateOrientationNudge);
  window.addEventListener('orientationchange', updateOrientationNudge);
  updateOrientationNudge();

  // -- Boot -------------------------------------------------
  render();
})();
</script>

</body>
</html>
